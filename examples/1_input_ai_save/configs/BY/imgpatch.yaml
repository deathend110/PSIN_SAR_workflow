sys:
  device: axi://ql100aiu?npu=0x40000000&dma=0x80000000
  run_backend: buyi
  mmuMode: true
  speedMode: false
  compressFtmp: false
  ocm_option: 4
  profile: false

pipeline:
  input:
    image_path: ./io/input/big_gray.png
  patch:
    patch_size: 512
    overlap_ratio: 0.5
  icore:
    json: ./imodel/BY/model_BY.json
    raw: ./imodel/BY/model_BY.raw

debug:
  dump_outputs: true
  dump_format: SFB
  output_dir: ./io/output/imgpatch
  output_wait_ms: 20000
