# rd_imaging.yaml
# 独立 RD 成像程序配置：echo 回波 bin -> SAR 灰度 PNG。
# 建议从 examples/2_Full_workflow 目录运行，这样相对路径会指向当前工程目录。

rd:
  # RD 执行模式：
  # auto = 默认优先选择 memory_float32，超过内存上限才回退到 scratch_double。
  # memory_float32 = 纯内存 float32 复数流程，磁盘 IO 最少，速度优先。
  # scratch_double = 原 double 精度 scratch 流程，用于数值对照。
  execution_mode: auto

  # 输入 echo 回波目录。程序会按文件名排序逐个处理。
  echo_dir: ./io/echo

  # 输入文件扩展名。
  echo_ext: .bin

  # SAR 成像 PNG 输出目录。输出文件名保持 echo 文件 stem，例如 xxx.bin -> xxx.png。
  output_dir: ./io/sar_img

  # RD 分块处理使用的磁盘临时目录。
  # 该目录需要有足够空间保存两个大 scratch 文件，处理完成后默认自动删除。
  scratch_dir: ./io/rd_scratch

  # 距离向处理每次处理的方位列数。
  # memory_float32 下推荐 64，内存更稳；板端稳定后可尝试 128。
  column_tile: 64

  # 方位 FFT / 方位压缩每次处理的距离行数。
  # memory_float32 下推荐 128，内存更稳；板端稳定后可尝试 256。
  row_tile: 128

  # 旧 double 内存流水线开关。通常保持 true 即可；auto 下优先使用 memory_float32。
  prefer_memory_pipeline: true

  # RD 允许使用的内存目标上限，单位 MB。
  # 超过该上限的大图会自动回退到 scratch 分块流程，避免 OOM。
  memory_limit_mb: 500

  # 是否保留 scratch 文件用于调试。
  # false 表示处理完成后删除临时文件。
  keep_scratch: false

  # 输出 PNG 已存在时是否覆盖。
  overwrite: true
