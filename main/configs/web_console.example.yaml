# web_console.example.yaml
# 首次运行时会自动 bootstrap 为同目录 web_console.yaml，本文件只作为仓库示例模板保留。

server:
  bind: 0.0.0.0
  board_ip: 192.168.137.100
  port: 8080
  sse_heartbeat_ms: 1000

ui:
  title: PSIN SAR Web Console

config:
  infer_path: configs/infer_workflow.yaml
  rd_path: configs/rd_imaging.yaml

flight:
  # manual_step_px 在扫描游标模式下不再驱动连续速度，manual 实际步长优先对齐 infer.stride。
  manual_step_px: 128
  # boost_step_px / trigger_distance_px / cache_grid_px 为兼容旧配置保留，
  # 当前扫描游标模式不再依赖它们驱动 manual patch 前进。
  boost_step_px: 256
  trigger_distance_px: 128
  cache_grid_px: 64
  path_overlay: true
  control_bindings: W/A/S/D
